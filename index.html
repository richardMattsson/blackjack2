<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grid-container">
      <!-- Deck and deal button -->
      <div class="item1">
        <img src="BACK.webp" alt="picture of a deck of cards" />
      </div>
      <!-- Dealer cards -->
      <div class="item2 rounded-borders">
        <ol id="dealerOList"></ol>
      </div>
      <!-- Header -->
      <div class="item3">
        <h1>BlackJack</h1>
      </div>
      <!-- New game button -->

      <textarea class="item4">
Player draw cards first. Closest to 21 wins. If you get over 21 you lose.</textarea
      >

      <!-- hit button and stay button field -->
      <div class="item5">
        <!-- <h2>Player-score</h2> -->
        <!-- <button id="hitButton">Hit</button> -->
        <button id="dealButton">Deal</button>
        <button id="stayButton">Stay</button>
      </div>
      <!-- Player card field -->
      <div class="item6 rounded-borders">
        <ol id="oList"></ol>
      </div>
      <!-- dealer score -->
      <div class="item7">
        <h2 class="header">Dealer-score</h2>
        <input id="dealerScore" type="text" placeholder="0" />
      </div>
      <!-- player score -->
      <div class="item8">
        <h2 class="header">Player-score</h2>
        <input id="playerScore" type="text" placeholder="0" />
      </div>
      <!-- Points -->
      <div class="points">
        <h2 class="header">Points</h2>
        <input id="points" type="text" placeholder="0" readonly />
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
